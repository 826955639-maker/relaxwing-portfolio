<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relaxwing可调压智能睡眠耳机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --light-purple: #E8D5F5;
            --light-pink: #FCE4EC;
            --purple: #C8A2E0;
            --pink: #F8BBD9;
            --dark-purple: #7B68EE;
            --white: #FFFFFF;
            --text: #4A4A4A;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--light-purple) 0%, var(--light-pink) 100%);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(123, 104, 238, 0.1);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--dark-purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-image: url('图册图片/封面.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #f5f5f5;
            padding-top: 60px;
        }

        section {
            padding: 60px 20px;
        }

        .section-title {
            text-align: center;
            font-size: 36px;
            margin-bottom: 40px;
            color: var(--dark-purple);
        }

        .book-container {
            max-width: 1400px;
            margin: 0 auto;
            perspective: 3000px;
        }

        .book {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 28.125%;
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(123, 104, 238, 0.2);
            overflow: visible;
        }

        .book-inner {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            transform-origin: left center;
            transition: all 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform: rotateY(-90deg);
            z-index: 1;
        }

        .page.active {
            opacity: 1;
            transform: rotateY(0deg);
            z-index: 10;
        }

        .page.next {
            opacity: 0;
            transform: rotateY(90deg);
            z-index: 1;
        }

        .page.prev {
            opacity: 0;
            transform: rotateY(-90deg);
            z-index: 1;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 15px;
        }

        .book-controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        .book-btn {
            padding: 12px 45px;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 20px rgba(123, 104, 238, 0.3);
        }

        .book-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(123, 104, 238, 0.4);
        }

        .book-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .page-counter {
            text-align: center;
            margin-top: 15px;
            font-size: 16px;
            color: var(--dark-purple);
        }

        .video-container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(123, 104, 238, 0.2);
        }

        .product-video {
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        .qr-section {
            padding: 60px 20px;
            text-align: center;
        }

        .qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .qr-image {
            width: 250px;
            height: 250px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(123, 104, 238, 0.2);
        }

        .qr-text {
            font-size: 24px;
            font-weight: bold;
            color: var(--dark-purple);
        }

        footer {
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            text-align: center;
            color: var(--text);
        }

        @media (max-width: 768px) {
            nav {
                padding: 12px 20px;
            }

            .logo {
                font-size: 18px;
            }

            section {
                padding: 40px 15px;
            }

            .section-title {
                font-size: 28px;
            }

            .book {
                padding-bottom: 50%;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Relaxwing可调压智能睡眠耳机</div>
    </nav>

    <section id="home" class="hero">
    </section>

    <section id="book">
        <h2 class="section-title">设计图册</h2>
        <div class="book-container">
            <div class="book">
                <div class="book-inner" id="book-inner">
                </div>
            </div>
            <div class="page-counter" id="page-counter">1 / 20</div>
            <div class="book-controls">
                <button class="book-btn" id="prev-btn" onclick="prevPage()" disabled>← 上一页</button>
                <button class="book-btn" id="next-btn" onclick="nextPage()">下一页 →</button>
            </div>
        </div>
    </section>

    <section id="video-section">
        <h2 class="section-title">动效展示</h2>
        <div class="video-container">
            <video controls class="product-video">
                <source src="03 产品动效.mp4" type="video/mp4">
                您的浏览器不支持视频播放。
            </video>
        </div>
    </section>

    <section class="qr-section">
        <h2 class="section-title">3D效果展示</h2>
        <div class="qr-container">
            <img src="展示.jpg" alt="扫码查看3D效果展示" class="qr-image">
            <p class="qr-text">扫码查看3D效果展示</p>
        </div>
    </section>

    <footer>
        <p>© 2025 Relaxwing | Design with ❤️</p>
    </footer>

    <script>
        const pages = [
            '图册图片/封面.png',
            '图册图片/扉页.png',
            '图册图片/目录.png',
            '图册图片/前期调研 封面.png',
            '图册图片/前期调研第一页.png',
            '图册图片/前期调研第二页.png',
            '图册图片/设计思路 封面.png',
            '图册图片/设计思路第一页.png',
            '图册图片/设计思路第二页.png',
            '图册图片/概念方案 封面.png',
            '图册图片/概念方案第一页.png',
            '图册图片/概念方案第二页.png',
            '图册图片/概念方案第三页.png',
            '图册图片/概念方案第四页.png',
            '图册图片/功能介绍 封面.png',
            '图册图片/功能介绍第一页.png',
            '图册图片/功能介绍第二页.png',
            '图册图片/尾页.png',
            '图册图片/感谢观看.png',
            '图册图片/封底.png'
        ];

        let currentPage = 0;
        const bookInner = document.getElementById('book-inner');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const pageCounter = document.getElementById('page-counter');

        function initBook() {
            pages.forEach((src, index) => {
                const page = document.createElement('div');
                page.className = 'page';
                page.id = `page-${index}`;
                page.innerHTML = `<img src="${src}" alt="第${index + 1}页">`;
                if (index === 0) {
                    page.classList.add('active');
                }
                bookInner.appendChild(page);
            });
            updateBook();
        }

        function updateBook() {
            document.querySelectorAll('.page').forEach((page, index) => {
                page.classList.remove('active', 'prev', 'next');
                page.style.transform = '';
                page.style.opacity = '';
                
                if (index === currentPage) {
                    page.classList.add('active');
                } else if (index < currentPage) {
                    page.classList.add('prev');
                } else {
                    page.classList.add('next');
                }
            });
            
            pageCounter.textContent = `${currentPage + 1} / ${pages.length}`;
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage === pages.length - 1;
        }

        function nextPage() {
            if (currentPage < pages.length - 1) {
                currentPage++;
                updateBook();
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                updateBook();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                prevPage();
            } else if (e.key === 'ArrowRight') {
                nextPage();
            }
        });

        initBook();
    </script>
</body>
</html>
